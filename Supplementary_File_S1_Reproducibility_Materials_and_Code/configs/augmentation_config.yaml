target_aug:
  purpose: increase effective participation of minority-class samples
  strategy:
    - minority-class-oriented instance augmentation
    - copy-paste-style instance insertion
    - adaptive Mosaic augmentation
  minority_class_threshold: 0.5 times the average number of class instances

class_weight:
  purpose: alleviate long-tailed optimization bias
  basis: effective number of samples
  applied_to: classification loss

SGRB_DE:
  full_name: Semantic-Guided ROI-Background Decoupled Enhancement
  stage: training only
  mask_source: bounding-box annotations of training images
  validation_inference_usage: not used
  purpose:
    - preserve target-related thermal details
    - suppress irrelevant background thermal responses
