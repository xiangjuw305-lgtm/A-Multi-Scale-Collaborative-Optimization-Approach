baseline: YOLOv10m
proposed_framework:
  base_detector: YOLOv10m
  components:
    - Target Aug
    - Class Weight
    - SGRB-DE
    - C2f-SimAM
    - MPDIoU

complexity:
  parameters_M: 15.32
  GFLOPs: 58.9

notes:
  - SGRB-DE is used only as a training-stage label-assisted enhancement strategy.
  - No ground-truth boxes, semantic masks, or manually specified ROI information are used during validation or inference.
  - SimAM is a parameter-free attention mechanism.
  - MPDIoU modifies the bounding-box regression loss and does not increase inference-time model complexity.
